management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
management.endpoint.metrics.enabled=true
management.endpoints.web.base-path=/actuator
management.info.env.enabled=true

info.app.name=Application de Supervision Spring
info.app.version=1.0.0
info.app.description=Solution TP8 - Observabilite et Journalisation

logging.level.root=INFO
logging.level.ma.ens.tp8monitoring=DEBUG
logging.file.name=logs/system.log
logging.pattern.console=%d{HH:mm:ss} [%t] %-5level %logger{36} - %msg%n

management.endpoint.prometheus.enabled=true
management.metrics.export.prometheus.enabled=true
